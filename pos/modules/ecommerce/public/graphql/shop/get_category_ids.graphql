query get_category_ids (
  $page: Int = 1,
  $size: Int = 50,
  $slug: String = "",
  $is_enabled: Boolean = true,
  $is_show_more: Boolean = false,
  $parent_ids: [String!],
  $sort_by: [RecordsSortInput!] = {
      properties: [
          { name: "name", order: ASC }
      ]
  }
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/insites_category" }
      properties: [
        { name: "slug", value: $slug }    
        { name: "parent_ids", array_overlaps: $parent_ids } 
        { name: "is_enabled", value_boolean: $is_enabled }
        { name: "is_archived", value_boolean: false }
      ] 
    }
    sort: $sort_by
  ) {
    total_entries
    total_pages
    current_page
    results {
      id 
      name:property(name: "name") @include(if: $is_show_more)
      slug:property(name: "slug") @include(if: $is_show_more)      
    }
  }
}