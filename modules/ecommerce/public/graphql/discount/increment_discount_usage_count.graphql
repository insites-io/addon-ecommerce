mutation increment_discount_usage_count (
  $ids: [ID!]
  $number_of_use: Float = 1
) {
  items: records_update_all (
    sync: true
    table: "modules/insites_ecommerce/discount"
    filter: {
      id: { value_in: $ids }
    }
    record: {
      properties: [
        { name: "usage_count", increment: $number_of_use }
      ]
    }
  ) {
    count
  }
}