query get_order_discounts (
  $page: Int=1,
  $size: Int=50,
  $discount_code_uuids: [String!]
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/order_discount" }
      properties: [
        { name: "discount_uuid", value_in: $discount_code_uuids }
      ] 
    }
  ) {
    results {
      id 
      discount_uuid: property(name: "discount_uuid")
      discount_code: property(name: "discount_code")
      order_uuid: property(name: "order_uuid")
      order: related_record(
        table: "modules/insites_ecommerce/order"
        foreign_property: "uuid"
        join_on_property: "order_uuid"
      ) {
        id
        order_contact_email: property(name: "order_contact_email")
      }
    }
  }
}