query get_order_details_minified (
  $id: ID
  $user_id: String
  ){
  items: records(
    per_page: 1
    filter: {
      id: { value: $id }
      deleted_at:{ exists:false }
      table: { value: "modules/insites_ecommerce/order" }
      properties:[
        { name: "user_id", value: $user_id }
      ]
    }
  ){
    results {

      user_id: property(name: "user_id")
      billing_company_name: property(name: "billing_company_name")
      billing_first_name: property(name: "billing_first_name") 
      billing_last_name: property(name: "billing_last_name") 
      billing_email: property(name: "billing_email") 
      billing_phone: property(name: "billing_phone") 
      billing_address_1: property(name: "billing_address_1") 
      billing_address_2: property(name: "billing_address_2") 
      billing_address_3: property(name: "billing_address_3") 
      billing_city: property(name: "billing_city") 
      billing_state: property(name: "billing_state") 
      billing_postcode: property(name: "billing_postcode") 
      billing_country: property(name: "billing_country")                   
      
      payment: related_record(
        table: "modules/insites_ecommerce/insites_payment"
        join_on_property: "id"
        foreign_property: "order_id"
        sort: { updated_at: { order: DESC }}
      ) {
        card_brand: property(name: "card_brand")
        card_last4: property(name: "card_last4")
        card_exp_month: property(name: "card_exp_month")
        card_exp_year: property(name: "card_exp_year")
      }
     
    }
  }
}