query get_cart_order_summary (
  $id: ID,
  $ids: [ID!],
  $not_id: [ID!], 
  $page: Int = 1,
  $size: Int = 100,
  $user_id: String,
  $order_id: String,
  $product_id: String,
  $product_variant_id: String,
  $status: String
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id, not_value_in: $not_id, value_in: $ids }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/cart" }
      properties: [
        { name: "user_id", value: $user_id }
        { name: "order_id", value: $order_id }
        { name: "status", value: $status }
        { name: "product_id", value: $product_id }
        { name: "product_variant_id", value: $product_variant_id }
      ] 
    }
    sort: { created_at: { order: ASC } }
  ) {
    total_entries
    total_pages
    current_page
    results {            
      product_price: property(name: "product_price")
      product_name: property(name: "product_name")
      quantity: property(name: "quantity")
      product_variant: property(name: "product_variant")
      product: related_record(
        table: "modules/insites_ecommerce/insites_product"
        foreign_property:"id", 
        join_on_property: "product_id") {
          unit_label: property(name: "unit_label")
      }      
    }
  }
}