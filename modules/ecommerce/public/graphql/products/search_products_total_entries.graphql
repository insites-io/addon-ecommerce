query search_products_total_entries(
  $page: Int = 1,
  $size: Int = 10,
  $keyword : String,
  $category_uuids: [String!],
  $brand: String,
  $is_on_sale: Boolean,
  $not_number: String,
  $sort:[RecordsSortInput!] = [
    { updated_at: { order: DESC } }
  ]
){
  items: records(
    page: $page
    per_page: $size
    filter:{
      table:{ value:"modules/insites_ecommerce/product" }
      properties:[
      	{ name: "status", not_value_in: ["archived","disabled"] }
        { name: "category_uuids", value_in: $category_uuids }
        { name: "is_on_sale", value_boolean: $is_on_sale }
        { name: "stock_level", range: { gt: $not_number } }
        { name: "brand_name", contains: $brand }
      ]
      fulltext:{
        keyword:$keyword
        match_type:CONTAINS
        operator:OR
      }
    }
    sort: $sort
  ){
     total_entries
     current_page
     per_page
  }
}