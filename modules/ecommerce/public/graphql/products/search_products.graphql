query search_products(
  $page: Int = 1,
  $size: Int = 10,
  $keyword : String,
  $keywords : [String!],
  $category_uuids: [String!],
  $brand: String,
  $brands: [String!],
  $brand_exists: Boolean,
  $is_on_sale: Boolean,
  $not_number: String,
  $stock_lte: String,
  $min_price: String,
  $max_price: String,
  $sort:[RecordsSortInput!] = [
    { updated_at: { order: DESC } }
  ]
){
  items: records(
    page: $page
    per_page: $size
    filter:{
      table:{ value:"modules/insites_ecommerce/product" }
      properties:[
      	{ name: "status", value: "enabled"}
        { name: "category_uuids", array_overlaps: $category_uuids }
        { name: "is_on_sale", value_boolean: $is_on_sale }
        { name: "stock_level", range: { gt: $not_number } }
        { name: "stock_level", range: { lte: $stock_lte } }
        ## Brand filter — all three key on brand_name so search matches the sidebar facet,
        ## which counts "Unbranded" as a blank brand_name (see sidebar_filters.liquid). Using
        ## brand_uuid for unbranded diverged from the facet (products with a blank brand_name
        ## but a non-null brand_uuid FK were miscounted). The three are mutually exclusive in
        ## practice — see list.liquid.
        { name: "brand_name", contains: $brand }
        { name: "brand_name", value_in: $brands }
        { name: "brand_name", exists: $brand_exists }
        { name: "effective_price", range: { gte: $min_price, lte: $max_price } }
      ]
      or:[
        {
          properties: { name: "product_name", contains: $keyword}           
        },
        {
          properties: { name: "long_description", contains: $keyword}           
        },
        {
          properties: { name: "short_description", contains: $keyword}           
        }
        {
          properties: { name: "keywords", array_contains: $keywords}           
        }
      ]
      
    }
    sort: $sort
  ){
    results {
      id
      updated_at
      uuid: property(name: "uuid")      
      product_name: property(name: "product_name")
      slug: property(name: "slug")
      sku: property(name: "sku")
      stock_level: property_int(name: "stock_level")
      is_featured: property_boolean(name: "is_featured")
      is_on_sale: property_boolean(name: "is_on_sale")
      regular_price: property_float(name: "regular_price")
      sale_price: property_float(name: "sale_price")
      effective_price: property_float(name: "effective_price")
      brand: property(name: "brand_name")
      category_uuids: property_array(name: "category_uuids")
      product_image: property_upload(name: "product_image") {
        url
      }
      is_product_variant_enabled: property_boolean(name: "is_product_variant_enabled") 
      tax_amount: property_float( name: "tax_amount")
      is_tax_included: property_boolean(name: "is_tax_included")
      is_fixed_tax_amount: property_boolean(name: "is_fixed_tax_amount")
      is_sale_price_tax_included: property_boolean(name: "is_sale_price_tax_included")   
      ## Get only the first variant
      variant: related_record(
        table: "modules/insites_ecommerce/product_variant"
        join_on_property: "uuid"
        foreign_property: "product_uuid"
        filter:{
          properties:[
            { name: "stock_level", range: { gt: $not_number } }
          ]
        }
      ){
        id
        uuid: property(name: "uuid")
        is_on_sale: property_boolean(name: "is_on_sale")
        sale_price: property_float(name: "sale_price")
        regular_price: property_float(name: "regular_price")
        effective_price: property_float(name: "effective_price")
        stock_level: property_int(name: "stock_level")
        sku: property(name: "product_sku")
        product_options: property_array(name: "product_options")
        tax_amount: property_float( name: "tax_amount")
        is_tax_included: property_boolean(name: "is_tax_included")
        is_fixed_tax_amount: property_boolean(name: "is_fixed_tax_amount")
        is_variant_sale_price_tax_included: property_boolean(name: "is_variant_sale_price_tax_included")  
      }
    }
  }
}