query get_product (
  $id: ID,
  $slug: String,
  $page: Int = 1,
  $size: Int = 1
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/product" }
      properties: [
        { name: "status", value: "enabled"}
        { name: "is_website_display", value_boolean: true}
        { name: "slug", value: $slug }
      ] 
    }
  ) {
    results {
      id        
      updated_at
      uuid: property(name: "uuid") 
      slug: property(name: "slug")          
      stock_level: property_int(name: "stock_level")  
      is_on_sale: property_boolean(name: "is_on_sale")
      sale_price: property_float(name: "sale_price")  
      regular_price: property_float(name: "regular_price")        
      product_name: property(name: "product_name")  
      sku: property(name: "sku")  
      short_description: property(name: "short_description")  
      long_description: property(name: "long_description")  
      is_product_variant_enabled: property_boolean(name: "is_product_variant_enabled")  
      tax_amount: property_float( name: "tax_amount")
      is_tax_included: property_boolean(name: "is_tax_included")
      is_fixed_tax_amount: property_boolean(name: "is_fixed_tax_amount")
      is_sale_price_tax_included: property_boolean(name: "is_sale_price_tax_included")    
      variants: related_records(
        table: "modules/insites_ecommerce/product_variant"
        join_on_property: "uuid"
        foreign_property: "product_uuid"
        sort: {id: {order: ASC}}
      ){
        id
        uuid: property(name: "uuid")
        is_on_sale: property_boolean(name: "is_on_sale")
        sale_price: property_float(name: "sale_price")  
        regular_price: property_float(name: "regular_price") 
        stock_level: property_int(name: "stock_level") 
        sku: property(name: "product_sku")
        product_image: property_upload(name: "product_image") {
          url
        }
        product_options: property_array(name: "product_options") 
        tax_amount: property_float( name: "tax_amount")
        is_tax_included: property_boolean(name: "is_tax_included")
        is_fixed_tax_amount: property_boolean(name: "is_fixed_tax_amount")
        is_variant_sale_price_tax_included: property_boolean(name: "is_variant_sale_price_tax_included") 
      }
      
      product_image: property_upload(name: "product_image") {
        url
      }     
      
      gallery_1: related_records(
        table: "modules/insites_core/attachment"
        join_on_property: "gallery_1"
        foreign_property: "uuid"
      ){
        file: property_upload(name: "file") {
          url
        }
      }

      gallery_2: related_records(
        table: "modules/insites_core/attachment"
        join_on_property: "gallery_2"
        foreign_property: "uuid"
      ){
        file: property_upload(name: "file") {
          url
        }
      }
    }
  }
}