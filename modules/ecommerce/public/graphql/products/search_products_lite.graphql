query search_products_lite(
  $page: Int = 1,
  $size: Int = 50,
  $keyword : String,
  $keywords : [String!],
  $sort:[RecordsSortInput!] = [
    { updated_at: { order: DESC } }
  ]
){
  ## Lightweight product search used by the predictive (typeahead) dropdown.
  ## Returns only the fields the suggestion list needs; ranking is done
  ## client-side in predictive-search.js, so no expensive sort/joins here.
  items: records(
    page: $page
    per_page: $size
    filter:{
      table:{ value:"modules/insites_ecommerce/product" }
      properties:[
        { name: "status", value: "enabled"}
      ]
      or:[
        {
          properties: { name: "product_name", contains: $keyword}
        },
        {
          properties: { name: "long_description", contains: $keyword}
        },
        {
          properties: { name: "short_description", contains: $keyword}
        }
        {
          properties: { name: "keywords", array_contains: $keywords}
        }
      ]
    }
    sort: $sort
  ){
    results {
      uuid: property(name: "uuid")
      product_name: property(name: "product_name")
      slug: property(name: "slug")
      brand: property(name: "brand_name")
      stock_level: property_int(name: "stock_level")
      is_on_sale: property_boolean(name: "is_on_sale")
      regular_price: property_float(name: "regular_price")
      sale_price: property_float(name: "sale_price")
      product_image: property_upload(name: "product_image") {
        url
      }
    }
  }
}
