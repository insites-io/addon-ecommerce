query get_product_brands($page: Int = 1, $size: Int = 100) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      table: {value_in: ["modules/ins_ecommerce/product_custom_field"]}, 
      properties: [{name: "brand", exists: true}]
    }
    sort: {
      properties: [{name: "brand", order: ASC}]
    }
  ) {
    total_entries
    total_pages
    current_page
    results {
      id
      brand: property(name: "brand")
    }
  }
}