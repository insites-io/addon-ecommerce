query get_products(
  $page: Int = 1,
  $size: Int = 10,
  $keyword : String,
  $category: [String!],
  $sort:[RecordsSortInput!] = [
    { updated_at: { order: DESC } }
  ]
){
  items: records(
    page: $page
    per_page: $size
    filter:{
      table:{
        value_in:["modules/insites_ecommerce/product"]
      }
      properties:[
      	{ name: "status", value: "enabled" }
        { name: "categories", value_in: $category }
      ]
      fulltext:{
        keyword:$keyword
        match_type:CONTAINS
        operator:OR
      }
    }
    sort: $sort
  ){
    total_entries
    total_pages
    current_page
    results {
      model_name: table
      id 
      created_at
      updated_at
      #properties
      product_name: property(name: "product_name")
      slug: property(name: "slug")
      sku: property(name: "sku")
      stock_level: property_int(name: "stock_level")
      #is_enabled: property_boolean(name: "is_enabled")
      is_featured: property_boolean(name: "is_featured")
      #variant_enabled: property_boolean(name: "variant_enabled")
      #variant_schema: property(name: "variant_schema")
      is_on_sale: property_boolean(name: "is_on_sale")
      regular_price: property_float(name: "regular_price")
      sale_price: property_float(name: "sale_price")
      short_description: property(name: "short_description")
      product_image: property_upload(name: "product_image") {
        #extension
        #file_name
        url
        #versions
      }
    }
  }
}