query get_cart_discount (
  $page: Int=1,
  $size: Int=1,
  $cart_uuid: String!,
  $discount_code_uuids: [String!]
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/cart_discount" }
      properties: [
        { name: "cart_uuid", value: $cart_uuid }
        { name: "discount_uuid", value_in: $discount_code_uuids }
      ] 
    }
  ) {
    results {
      id 
      cart_uuid: property(name: "cart_uuid")
      discount_uuid: property(name: "discount_uuid")
      discount_code: property(name: "discount_code")
    }
  }
}