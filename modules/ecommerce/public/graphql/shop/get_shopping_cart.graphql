query get_shopping_cart (
  $id: ID,
  $ids: [ID!],
  $not_id: [ID!], 
  $page: Int = 1,
  $size: Int = 100,
  $user_id: String,
  $order_id: String,
  $product_id: String,
  $product_variant_id: String,
  $status: String
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id, not_value_in: $not_id, value_in: $ids }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/cart" }
      properties: [
        { name: "user_id", value: $user_id }
        { name: "order_id", value: $order_id }
        { name: "status", value: $status }
        { name: "product_id", value: $product_id }
        { name: "product_variant_id", value: $product_variant_id }
      ] 
    }
    sort: { created_at: { order: ASC } }
  ) {
    total_entries
    total_pages
    current_page
    results {
      id       
      product_id: property(name: "product_id")
      quantity: property_int(name:"quantity")
      product_sku: property(name:"product_sku")
      product_name: property(name:"product_name")
      product_price: property_float(name:"product_price")
      product_variant: property(name:"product_variant")
      product_variant_id: property(name:"product_variant_id")      
      product_variant_sku: property(name:"product_variant_sku")     
      main_product: related_records(
            foreign_property: "id"
            join_on_property: "product_id"
            table: "modules/insites_ecommerce/product"
        ) {
            stock: property_int(name: "stock")
            main_image: related_records(
                table: "modules/insites_ecommerce/insites_product_uploads"
                foreign_property: "id"
                join_on_property: "main_image"
                ) {
                    file: property_upload(name: "file") {
                        url
                        versions(names: "88x66")
                    }
                }
      }           
    }
  }
}