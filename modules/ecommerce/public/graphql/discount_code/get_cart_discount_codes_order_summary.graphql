query get_cart_discount_codes_order_summary (
  $id: ID,
  $ids: [ID!],
  $not_id: [ID!], 
  $page: Int = 1,
  $size: Int = 30,
  $user_id: String,
  $order_id: String,
  $discount_code: String
  $discount_debited: Boolean
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      id: { value: $id, not_value_in: $not_id, value_in: $ids }
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/cart_discount_codes" }
      properties: [
        { name: "user_id", value: $user_id }
        { name: "order_id", value: $order_id }
        { name: "discount_code", value: $discount_code }
        { name: "discount_debited", value_boolean: $discount_debited }
      ] 
    }
    sort: { created_at: { order: ASC } }
  ) {
    total_entries
    total_pages
    current_page
    results {
      discount_code: property(name: "discount_code")                        
      discount_codes: related_record(
        table: "modules/insites_ecommerce/insites_discount_codes"
        join_on_property: "discount_code_id",
        foreign_property: "id"
        sort: { updated_at: { order: DESC }}
        filter: {
          deleted_at: { exists: false }
          properties: { name: "is_enabled", value_boolean: true }
        }
      ) {
        discount_type: property(name: "discount_type")
        discount_code: property(name: "discount_code")
        discount_value: property_float(name: "discount_value")
        apply_to_total: property_boolean(name: "apply_to_total")
        discount_name: property(name: "discount_name")
        minimum_cart_value: property_float(name: "minimum_cart_value")        
      }
    }
  }
}