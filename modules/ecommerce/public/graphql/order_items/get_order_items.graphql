query get_order_items (
  $page: Int=1
  $size: Int=50
  $order_uuid: String!
) {
  items: records(
    page: $page
    per_page: $size
    filter: {
      deleted_at: { exists: false }
      table: { value: "modules/insites_ecommerce/order_item" }
      properties: [
        { name: "order_uuid", value: $order_uuid }
      ] 
    }
  ) {
    total_entries    
    results {
      id       
      sku: property(name: "sku")
      quantity: property_int(name: "quantity")
      item_price: property_float(name: "item_price")
      is_fixed_tax_amount: property_boolean(name: "is_fixed_tax_amount")  
      tax_amount: property_float(name: "tax_amount")
      order_item_name: property(name: "order_item_name")
      order_item_image: property(name: "order_item_image")      
    }
  }
}