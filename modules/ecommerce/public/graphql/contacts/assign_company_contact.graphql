mutation assign_company_contact (
  $id: ID!,
  $company_uuid: String
) {
  items: user_update (
    id: $id
  	user: {
      profiles: [
        {
          name: "modules/insites_core/crm_contact",
          values: {
            deleted_at: null,
            properties: [
              { name: "company_uuid", value: $company_uuid }
            ]
          }
        }
      ]
    }
  ) {
    id
    created_at
    updated_at
    first_name
    last_name
    email
    customer_details: profiles(profile_type: "modules/insites_core/crm_contact") {
      company_uuid: property(name: "company_uuid")
    }
  }
} 