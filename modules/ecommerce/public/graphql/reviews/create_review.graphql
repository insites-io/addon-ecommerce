mutation create_review(
  $uuid: String!
  $reviewed_product: String!
  $rating: Int!
  $review_content: String!
  $reviewer_first_name: String!
  $reviewer_last_name: String!
  $reviewer_email: String!
  $is_guest: Boolean!
) {
  items: record_create(
    record: {
      table: "modules/ecommerce/reviews"
      properties: [
        { name: "uuid", value: $uuid }
        { name: "reviewed_product", value: $reviewed_product }
        { name: "rating", value_int: $rating }
        { name: "review_content", value: $review_content }
        { name: "status", value: "Pending" }
        { name: "reviewer_first_name", value: $reviewer_first_name }
        { name: "reviewer_last_name", value: $reviewer_last_name }
        { name: "reviewer_email", value: $reviewer_email }
        { name: "is_guest", value_boolean: $is_guest }
      ]
    }
  ) {
    id
    uuid: property(name: "uuid")
    rating: property_int(name: "rating")
    status: property(name: "status")
    reviewed_product: property(name: "reviewed_product")
  }
}
